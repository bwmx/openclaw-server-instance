# OpenClaw + AC2 pairing stack.
#
# Services:
#   openclaw-gateway — the OpenClaw gateway (NOT published publicly; loopback only)
#   pair-manager     — token-protected QR page driving `openclaw ac2 pair`
#                      (shares the gateway's network namespace; reachable
#                      internally at openclaw-gateway:8377, not published to
#                      the host)
#   caddy            — TLS-terminating reverse proxy (self-signed cert),
#                      fronted by Cloudflare in "Full" SSL mode
#
# Public surface: ONLY 80/443 (caddy). The pair page itself stays
# token-protected behind that.

services:
  openclaw-gateway:
    build:
      context: .
      args:
        OPENCLAW_IMAGE: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    image: openclaw-ac2:local
    command: ["node", "dist/index.js", "gateway"]
    restart: unless-stopped
    environment:
      HOME: /home/node
      OPENCLAW_DISABLE_BONJOUR: "1"
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:?set in .env}
      AC2_LIQUID_AUTH_SERVER: ${AC2_LIQUID_AUTH_SERVER:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_MODEL: ${GOOGLE_MODEL:-}
    volumes:
      - openclaw_data:/home/node/.openclaw
    expose:
      # Pair page (served by pair-manager in this netns) — reached via caddy,
      # not published to the host.
      - "8377"
    ports:
      # Gateway/Control UI: host loopback only. Reach it via SSH tunnel.
      - "127.0.0.1:18789:18789"
    tmpfs:
      - /tmp:size=256m
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    # --- hardening ---
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 512
    mem_limit: 2g
    cpus: "2.0"

  pair-manager:
    image: openclaw-ac2:local
    entrypoint: ["/bin/sh", "/app/pair-manager/entry.sh"]
    restart: unless-stopped
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    # Share the gateway's network namespace: `openclaw ac2 pair` can reach the
    # gateway on 127.0.0.1, and the pair page is reachable by other containers
    # at openclaw-gateway:8377 (caddy proxies to it; not published to the host).
    network_mode: "service:openclaw-gateway"
    environment:
      HOME: /home/node
      OPENCLAW_ENTRY: /app/dist/index.js
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:?set in .env}
      AC2_LIQUID_AUTH_SERVER: ${AC2_LIQUID_AUTH_SERVER:-}
      PAIR_TOKEN: ${PAIR_TOKEN:?set in .env}
      PAIR_PORT: "8377"
      PAIR_SESSION_TTL_MS: ${PAIR_SESSION_TTL_MS:-900000}
    volumes:
      - openclaw_data:/home/node/.openclaw
    tmpfs:
      - /tmp:size=128m
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8377/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    # --- hardening ---
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 1g
    cpus: "1.0"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      pair-manager:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN:?set in .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    # --- hardening ---
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    pids_limit: 128
    mem_limit: 256m
    cpus: "0.5"

volumes:
  # Named volume: initialized on first run from the image's /home/node/.openclaw,
  # which already contains the installed AC2 plugin (with rebuilt native addons)
  # and the plugin/channel wiring in openclaw.json.
  openclaw_data:
  # Persists Caddy's self-signed cert/key and internal CA so they survive
  # container restarts/rebuilds.
  caddy_data:
  caddy_config:
